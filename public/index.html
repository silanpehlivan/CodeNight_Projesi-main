<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampuSupport - Kampüs Destek & Ticket Yönetim Sistemi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-brand">CampuSupport</div>
      <div class="nav-menu">
        <a href="#" onclick="showSection('dashboard')">Dashboard</a>
        <a href="#" onclick="showSection('tickets')">Tickets</a>
        <a href="#" onclick="showSection('new-ticket')">Yeni Ticket</a>
        <a href="#" onclick="logout()">Çıkış</a>
      </div>
    </nav>

    <!-- Auth Section -->
    <div id="auth-section" class="section active">
      <div class="auth-container">
        <div class="auth-box">
          <h1>CampuSupport</h1>
          <p>Kampüs Destek & Ticket Yönetim Sistemi</p>
          
          <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Giriş Yap</button>
            <button class="tab-btn" onclick="switchTab('register')">Kayıt Ol</button>
          </div>

          <!-- Login Form -->
          <form id="login-form" class="auth-form active">
            <input type="email" id="login-email" placeholder="E-posta" required>
            <input type="password" id="login-password" placeholder="Şifre" required>
            <button type="submit" class="btn btn-primary">Giriş Yap</button>
            <p id="login-error" class="error-msg"></p>
          </form>

          <!-- Register Form -->
          <form id="register-form" class="auth-form">
            <input type="email" id="register-email" placeholder="E-posta" required>
            <input type="password" id="register-password" placeholder="Şifre" required>
            <input type="text" id="register-student-id" placeholder="Öğrenci Numarası (opsiyonel)">
            <select id="register-role">
              <option value="student">Öğrenci</option>
              <option value="support">Destek Personeli</option>
              <option value="department">Departman</option>
              <option value="admin">Admin</option>
            </select>
            <button type="submit" class="btn btn-primary">Kayıt Ol</button>
            <p id="register-error" class="error-msg"></p>
          </form>
        </div>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard" class="section">
      <h2>Dashboard</h2>
      <div class="dashboard-grid">
        <div class="stat-card">
          <h3>Toplam Tickets</h3>
          <p id="total-tickets">0</p>
        </div>
        <div class="stat-card">
          <h3>Açık Tickets</h3>
          <p id="open-tickets">0</p>
        </div>
        <div class="stat-card">
          <h3>Devam Eden</h3>
          <p id="in-progress-tickets">0</p>
        </div>
        <div class="stat-card">
          <h3>Çözülen</h3>
          <p id="resolved-tickets">0</p>
        </div>
      </div>
    </div>

    <!-- Tickets Section -->
    <div id="tickets" class="section">
      <h2>Tickets</h2>
      <div class="filters">
        <select id="status-filter" onchange="filterTickets()">
          <option value="">Tüm Durumlar</option>
          <option value="open">Açık</option>
          <option value="in_progress">Devam Eden</option>
          <option value="resolved">Çözülen</option>
          <option value="closed">Kapalı</option>
        </select>
        <select id="priority-filter" onchange="filterTickets()">
          <option value="">Tüm Öncelikler</option>
          <option value="low">Düşük</option>
          <option value="medium">Orta</option>
          <option value="high">Yüksek</option>
        </select>
      </div>
      <div id="tickets-list" class="tickets-list"></div>
    </div>

    <!-- New Ticket Section -->
    <div id="new-ticket" class="section">
      <h2>Yeni Ticket Oluştur</h2>
      <form id="new-ticket-form" class="ticket-form">
        <input type="text" id="ticket-title" placeholder="Başlık" required>
        <textarea id="ticket-description" placeholder="Açıklama" rows="5" required></textarea>
        <select id="ticket-category">
          <option value="">Kategori Seçin</option>
          <option value="wifi">Wi-Fi Çekmiyorum</option>
          <option value="lms">LMS Sifrem Kilitlendi</option>
          <option value="lab">Lab 302 Projeksiyon Bozuk</option>
          <option value="other">Danışman Randevusu Alamıyorum</option>
        </select>
        <select id="ticket-priority">
          <option value="medium">Orta Öncelik</option>
          <option value="low">Düşük Öncelik</option>
          <option value="high">Yüksek Öncelik</option>
        </select>
        <select id="ticket-department">
          <option value="">-- Departman Seçin (Opsiyonel) --</option>
        </select>
        <button type="submit" class="btn btn-primary">Ticket Oluştur</button>
        <p id="ticket-error" class="error-msg"></p>
        <p id="ticket-success" class="success-msg"></p>
      </form>
    </div>

    <!-- Ticket Detail Section -->
    <div id="ticket-detail" class="section">
      <button onclick="showSection('tickets')" class="btn btn-secondary">Geri Dön</button>
      <div id="ticket-detail-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
